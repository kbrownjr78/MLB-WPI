name: MLB Monte Carlo Prediction Engine

on:
  schedule:
    - cron: '0 10 * * *' # Runs daily at 10:00 AM UTC / 6:00 AM EST
  workflow_dispatch: # Allows manual triggers from the GitHub UI

jobs:
  run-predictions:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scipy requests pybaseball

    - name: Run MLB Predictive Model
      env:
        WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }} # Optional: For live weather APIs
      run: |
        python src/predict_games.py

    - name: Upload Daily Predictions Artifact
      uses: actions/upload-artifact@v4
      with:
        name: daily-mlb-predictions-${{ datetime.date.today() }}
        path: data/predictions/
        retention-days: 7
