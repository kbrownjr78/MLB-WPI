name: MLB Monte Carlo Prediction Engine

on:
  schedule:
    - cron: '0 10 * * *' # Runs daily at 10:00 AM UTC / 6:00 AM EST
  workflow_dispatch: # Allows manual one-click execution from the GitHub Actions tab

permissions:
  contents: write # Grants the runner explicit write access to commit code changes back to the main branch

jobs:
  run-predictions:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true # Persists auth token enabling git pushes back to the branch

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Speeds up execution by caching downloaded python packages

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create Architecture Directories
      run: |
        mkdir -p data/predictions
        mkdir -p data/analysis

    - name: Run Inning-by-Inning Predictive Model
      run: |
        python src/predict_games.py

    - name: Isolate Daily Top 5 Highest Probability Bets
      run: |
        python src/get_top_bets.py

    - name: Execute Historical Backtest and ROI Ledger Settlement
      run: |
        python src/backtest_engine.py

    - name: Commit and Push Compiled Matrix Logs to Main Branch
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@://github.com"
        
        # 🛡️ FIX: Stages the entire data/ folder tree to prevent bash wildcard pathspec string failures
        git add --ignore-errors data/
        
        if git diff --cached --quiet; then
          echo "No structural dataset changes detected. Skipping commit sequence."
        else
          git commit -m "Automated Pipeline Update: Generated Predictions, Top Bets, and Settle Ledger for $(date +'%Y-%m-%d')"
          git push origin main
        fi
